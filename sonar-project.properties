# ============================================================
# SonarQube / SonarCloud Project Configuration
# ============================================================

# --- Project Identity ---
sonar.projectKey=ax-studio
sonar.projectName=AX Studio
sonar.projectVersion=0.9.11

# --- Source & Test Roots ---
sonar.sources=core/src,web-app/src
sonar.tests=core/src,web-app/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# --- Exclusions ---
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  src-tauri/**,\
  extensions/**,\
  **/test/**,\
  **/*.d.ts

# --- TypeScript ---
sonar.typescript.tsconfigPath=web-app/tsconfig.json

# --- Coverage (lcov generated by vitest --coverage) ---
sonar.javascript.lcov.reportPaths=\
  core/coverage/lcov.info,\
  web-app/coverage/lcov.info

# --- Encoding ---
sonar.sourceEncoding=UTF-8

# --- Host & Auth ---
sonar.host.url=http://localhost:9000
sonar.token=sqp_fb40a575d4df25a63f91f045523bf45e2917bd4a
