<!doctype html>
<html lang="en" class="bg-app">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/ax-studio-logo.png"
    />
    
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/ax-studio-logo.png"
    />
    <link rel="apple-touch-icon" href="/images/ax-studio-logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover"
    />
    <title>Ax-Studio</title>
    <link rel="stylesheet" href="/src/loader.css" />
  </head>
  <body>
    <div id="initial-loader">
      <img src="/images/ax-studio-logo.png" alt="Ax-Studio Logo" />
    </div>
    <div id="root"></div>
    <script>
      ;(() => {
        const sanitizePersistedStorage = () => {
          const jsonStorageKeys = [
            'left-panel',
            'threads',
            'messages',
            'theme',
            'model-provider',
            'model-sources',
            'setting-appearance',
            'setting-general',
            'setting-local-api-server',
            'setting-proxy-config',
            'setting-hardware',
            'productAnalyticPrompt',
            'productAnalytic',
            'tool-approval',
            'tool-availability',
            'favorite-models',
            'thread-management',
            'ax-studio-service-config',
          ]

          for (const key of jsonStorageKeys) {
            const value = localStorage.getItem(key)
            if (!value) continue
            try {
              JSON.parse(value)
            } catch {
              localStorage.removeItem(key)
            }
          }
        }

        const hideInitialLoader = () => {
          const loader = document.getElementById('initial-loader')
          if (!loader) return
          document.body.classList.add('loaded')
          setTimeout(() => loader.remove(), 300)
        }

        const showStartupError = () => {
          const root = document.getElementById('root')
          if (!root || root.childElementCount > 0) return
          root.innerHTML =
            '<div style="height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;text-align:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#666;">Ax-Studio failed to initialize. Please restart the app.</div>'
        }

        const startupFailSafe = () => {
          if (!document.getElementById('initial-loader')) return
          hideInitialLoader()
          showStartupError()
        }

        sanitizePersistedStorage()
        window.addEventListener('error', startupFailSafe, { once: true })
        window.addEventListener('unhandledrejection', startupFailSafe, {
          once: true,
        })
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
